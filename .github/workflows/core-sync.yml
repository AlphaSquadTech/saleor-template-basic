name: Sync Core Submodule

on:
  schedule:
    - cron: '0 6 * * *' # Daily at 6 AM UTC
  workflow_dispatch:
  repository_dispatch:
    types: [core-updated]

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Setup SSH deploy key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SALEOR_SSH_PRIVATE_KEY_BASE64 }}" | base64 --decode > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: git submodule update --init --recursive

      - name: Update submodule
        run: |
          cd core
          git checkout main
          git pull origin main
          cd ..

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create PR
        id: create-pr
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump storefront-core to latest"
          title: "chore: bump storefront-core to latest"
          body: "Automated update of storefront-core submodule to latest main."
          branch: chore/bump-core
          delete-branch: true

      - name: Auto-merge PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          echo "Waiting for GitHub to calculate mergeability..."
          sleep 5
          
          # Get mergeable status (CLEAN, CONFLICTING, or UNKNOWN)
          STATUS=$(gh pr view "$PR_NUMBER" --json mergeable --template '{{.mergeable}}')
          
          if [ "$STATUS" = "CONFLICTING" ]; then
            echo "PR has conflicts. Manual intervention required."
            exit 1
          fi

          # Attempt --auto first (respects protection rules). 
          # Fallback to immediate merge if --auto is not supported/configured.
          gh pr merge "$PR_NUMBER" --squash --auto || gh pr merge "$PR_NUMBER" --squash